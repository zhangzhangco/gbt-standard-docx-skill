            paragraphs:
              - SDR整幅图像平均分为16块相间的白色方格和黑色方格的测量信号。
              - HDR整幅图像平均分为16块相间的白色方格和黑色方格的测量信号，见图4。
              - type: figure
                title: 帧内对比度测量信号
                title_en: In-frame contrast test signal
                paragraphs:
                  - 图4给出了帧内对比度测量信号的示意形式。
          - title: 帧速率测量信号
            paragraphs:
              - 测量信号分为11组，影片分辨率和帧速率要求见表7。
              - type: table
                title: 帧速率测量信号的影片分辨率和帧速率要求
                title_en: Resolution and frame-rate requirements of frame-rate test signals
                rows:
                  - ["序号", "影片分辨率", "帧速率（fps）"]
                  - ["1", "4K（2D）", "24、48、60"]
                  - ["2", "2K（3D）", "24、48、60"]
                  - ["3", "2K（2D）", "24、48、60、96、120"]
      - title: 测量环境和测量条件
        paragraphs:
          - 测量环境要求如下。
          - a) 环境温度：15 ℃～35 ℃。
          - b) 相对湿度：10%～90%。
          - c) 大气压力：86 kPa～106 kPa。
          - d) 电压幅度：220 V±10 V AC。
          - e) 标称频率：50 Hz。
          - 测量条件要求如下。
          - a) 所有设备应处于正常稳定工作状态，或按测量要求进行配置。
          - b) 所有测量信号应由数字电影播放服务器播放输出至LED显示屏。
          - c) 测量光学系统宜在LED显示屏中心点色彩还原合格的范围内进行。
          - d) 测量光学系统时，应在LED显示屏光输出稳定和立体放映设备稳定后进行。
          - e) 测量光学系统时，光学测量仪器架设在观影厅座位区中心点，距选定座椅地面1.15 m高度的位置，测量镜头对准LED显示屏中心并对焦清晰。
          - f) 测量立体放映光学系统时，立体眼镜应置于水平状态，且镜片应与测量轴线垂直。
          - g) 每次开启声学测量设备后，应先进行系统校准，才能进行相应的声学测量。
          - h) 测量放映声学系统时，测量传声器架设在观影厅座位区距选定座椅地面1.15 m高度的位置，测量传声器指向屏幕方向并向上仰起45°角。
          - i) 测量放映声学系统时，频谱分析仪或混响时间测量仪应放置在被测观影厅之外，避免噪声影响测量结果。
      - title: 测量步骤
        children:
          - title: 中心点亮度
            paragraphs:
              - a) 开启分光辐射亮度计。
              - b) 放映白场测量信号。
              - c) 测量并记录LED显示屏的白场中心点亮度。
              - d) 在观众区第一排和最后一排中心座椅位置、中间排最左端和最右端座椅位置，测量并记录LED显示屏的白场中心点亮度。
          - title: 全屏亮度平均值
            paragraphs:
              - a) 开启成像式亮度计。
              - b) 放映白场测量信号。
              - c) 测量并记录LED显示屏的全屏亮度平均值。
          - title: 亮度均匀度（模组）
            paragraphs:
              - a) 开启成像式亮度计。
              - b) 放映白场测量信号。
              - c) 测量并记录LED显示屏每个模组的白场亮度La和LED显示屏白场中心点亮度L。
              - d) 按照公式（1）分别计算亮度均匀度（模组）U，取最差值为测量结果。
          - title: 顺序对比度
            paragraphs:
              - a) 按照7.4.1测量白场中心点亮度。
              - b) 开启分光辐射亮度计。
              - c) 放映黑场测量信号。
              - d) 测量并记录LED显示屏的黑场中心点亮度。
              - e) 白场中心点亮度与黑场中心点亮度的比值即为顺序对比度，用：1方式表示。
          - title: 帧内对比度
            paragraphs:
              - a) 开启分光辐射亮度计。
              - b) 分别测量LED显示屏的8个白格中心位置的亮度Lw和8个黑格中心位置的亮度Lb。
              - c) 按照公式（2）计算帧内对比度Ci，用：1方式表示。
          - title: 中心点色彩还原
            paragraphs:
              - a) 开启分光辐射色度计。
              - b) 分别放映白场、红场、绿场、蓝场测量信号。
              - c) 分别测量并记录LED显示屏中心点的色度坐标值。
              - d) 在观众区第一排和最后一排中心座椅位置、中间排最左端和最右端座椅位置，测量并记录LED显示屏中心点的色度坐标值。
          - title: 色度均匀度（模组）
            paragraphs:
              - a) 开启成像式色度计。
              - b) 放映白场测量信号。
              - c) 测量并记录LED显示屏每个模组的白场色度坐标值和LED显示屏白场中心点色度坐标值。
              - d) 分别计算每个模组白场色度坐标与中心点色度坐标的差值△x和△y，取最差值为测量结果。
          - title: 电光转换特性
            paragraphs:
              - SDR测量步骤：开启分光辐射亮度计，分别放映“黑到白”和“黑到深灰”灰阶测量信号，测量每个灰阶的中心点亮度值，使用最小二乘法拟合图像信号编码值与图像亮度之间的曲线幂值，即为伽马。
              - HDR测量步骤：开启分光辐射亮度计，分别放映“黑到白”和“黑到深灰”灰阶测量信号，测量每个灰阶中心点亮度，并计算其与参考输出亮度之间的百分比。
          - title: 立体放映中心点亮度
            paragraphs:
              - a) 开启分光辐射亮度计。
              - b) 设置LED显示屏为立体放映模式，使用立体放映设备。
              - c) 左右眼同时放映白场测量信号。
              - d) 分别透过立体眼镜的左眼镜片和右眼镜片，测量左眼白场中心点亮度值Ll和右眼白场中心点亮度值Lr。
              - e) 按照公式（4）计算并记录LED显示屏的立体放映中心点亮度L。
          - title: 双眼亮度差
            paragraphs:
              - a) 按照立体放映中心点亮度的测量步骤，测量左眼白场中心点亮度Ll和右眼白场中心点亮度Lr。
              - b) 按照公式（5）计算并记录双眼亮度差Ld。
          - title: 立体放映亮度均匀度
            paragraphs:
              - a) 开启分光辐射亮度计。
              - b) 设置LED显示屏为立体放映模式，使用立体放映设备。
              - c) 左右眼同时放映白场测量信号。
              - d) 通过左眼镜片和右眼镜片分别测量四边缘及中心点亮度。
              - e) 按照公式（6）和公式（7）计算左眼和右眼的亮度均匀度。
          - title: 立体放映中心点白场色度坐标
            paragraphs:
              - a) 开启分光辐射色度计。
              - b) 设置LED显示屏为立体放映模式，使用立体放映设备。
              - c) 左右眼同时放映白场信号。
              - d) 分别透过立体眼镜的左眼镜片和右眼镜片，测量并记录LED显示屏的立体放映中心点白场色度坐标值。
          - title: 立体放映消光比
            paragraphs:
              - 按照左眼白场/右眼黑场和左眼黑场/右眼白场两种状态分别测量中心点亮度。
              - 按照公式（8）计算左眼立体放映消光比Il，按照公式（9）计算右眼立体放映消光比Ir。
          - title: 屏幕表面反射率
            paragraphs:
              - 漫反射率测量：关闭LED显示屏，使用反射率测试仪贴紧LED显示屏，在多个位置测量，按波长计算平均值并记录最差值。
              - 镜面反射率测量：关闭LED显示屏，使用反射率测试仪贴紧LED显示屏，在多个位置测量，按波长计算平均值并记录最差值。
          - title: 像素可见性
            paragraphs:
              - a) 放映单像素测量信号。
              - b) 在座位席第一排查看，能否观察到LED显示屏的像素结构和像素间的明显暗区。
          - title: 图像缩放
            paragraphs:
              - a) 放映单像素测量信号。
              - b) 在座位席第一排查看，能否观察到LED显示屏的图像缩放伪影。
          - title: 亚像素空间一致性
            paragraphs:
              - a) 放映单像素测量信号。
              - b) 在座位席第一排查看，能否观察到LED显示屏的亚像素空间排列的几何异常，如边缘或棋盘伪影。
          - title: 时空混叠
            paragraphs:
              - a) 放映单像素测量信号。
              - b) 在座位席第一排查看，能否观察到LED显示屏的像素多路复用或扫描产生的可见伪影。
          - title: 抖动
            paragraphs:
              - a) 放映黑场测量信号。
              - b) 在座位席第一排查看，能否观察到LED显示屏的像素抖动。
          - title: 像素缺陷
            paragraphs:
              - a) 放映白、黑、红、绿、蓝场测量信号。
              - b) 在座位席第一排查看，能否观察到LED显示屏的死灯、缺色、色块、亮点、暗点、亮线、暗线等像素缺陷。
          - title: 帧速率
            paragraphs:
              - a) 放映帧速率测量信号。
              - b) 查看LED显示屏能否正常播放。
          - title: 混响时间（RT60）
            paragraphs:
              - 应按照GY/T 311—2017中5.3.9规定的测量步骤进行测量。
          - title: 混响时间频率特性
            paragraphs:
              - 应按照GY/T 311—2017中5.3.9规定的测量步骤进行测量。
          - title: 背景噪声
            paragraphs:
              - 应按照GY/T 311—2017中5.3.10规定的测量步骤进行测量。
          - title: 隔声量
            paragraphs:
              - 应按照GY/T 311—2017中5.3.11规定的测量步骤进行测量。
          - title: 声场分布
            paragraphs:
              - 应按照GY/T 311—2017中5.3.12规定的测量步骤进行测量。
          - title: 电声响应特性
            paragraphs:
              - 应按照GY/T 312—2017中第3章规定的测量步骤进行测量。
          - title: 座椅规格
            paragraphs:
              - 目测。
          - title: 座椅扶手中到中宽度
            paragraphs:
              - 应按照GY/T 311—2017中5.3.3规定的测量步骤进行测量。
          - title: 座椅扶手间净宽
            paragraphs:
              - 应按照GY/T 311—2017中5.3.4规定的测量步骤进行测量。
          - title: 座椅排距
            paragraphs:
              - 应按照GY/T 311—2017中5.3.5规定的测量步骤进行测量。
          - title: 相邻两排座椅最小净宽
            paragraphs:
              - 应按照GY/T 311—2017中5.3.5规定的测量步骤进行测量。
          - title: 设计视点高度
            paragraphs:
              - 应按照GY/T 311—2017中5.3.7规定的测量步骤进行测量。
          - title: 最远视距与最大有效放映画面宽度的比值
            paragraphs:
              - 应按照GY/T 311—2017中5.3.1规定的测量步骤进行测量。
          - title: 最大仰视角
            paragraphs:
              - 应按照GY/T 311—2017中5.3.2规定的测量步骤进行测量。
          - title: 视线超高值
            paragraphs:
              - 应按照GY/T 311—2017中5.3.8规定的测量步骤进行测量。

