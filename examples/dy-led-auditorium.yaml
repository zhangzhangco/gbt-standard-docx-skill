  - title: 测量方法
    children:
      - title: 测量设备
        children:
          - title: 成像式亮度计
            paragraphs:
              - 成像式亮度计应符合以下要求。
              - 测量范围：≥0.0005 cd/m2～5,000 cd/m2。
              - 精度：≤±3%。
              - 像素数：≥6,576×4,384。
          - title: 成像式色度计
            paragraphs:
              - 成像式色度计应符合以下要求。
              - 精度x，y：≤±0.003。
              - 像素数：≥6,576×4,384。
          - title: 分光辐射亮度计
            paragraphs:
              - 分光辐射亮度计应符合以下要求。
              - 测量范围：≥0.001 cd/m2～5,000 cd/m2。
              - 接收角度：≤1°。
              - 精度：≤±2%。
          - title: 分光辐射色度计
            paragraphs:
              - 分光辐射色度计应符合以下要求。
              - 波长范围：380 nm～780 nm。
              - 测量带宽：≥2.5 nm～20 nm。
              - 接收角度：≤1°。
              - 色度精度x，y：≤±0.002。
          - title: 反射率测试仪
            paragraphs:
              - 反射率测试仪应符合以下要求。
              - 可测镜面反射率和漫反射率。
              - 照明：d/8积分球结构（漫射照明）。
              - 积分球尺寸：≥Ø54 mm。
              - 光源：脉冲氙灯，数量≥2，可模拟标准照明体A、C、D50、D65等。
              - 波长范围：≥360 nm～740 nm。
              - 反射率测量范围：≥0%～175%。
              - 显示分辨率：0.01。
          - title: 噪声信号发生器
            paragraphs:
              - 应符合GY/T 311—2017中5.2.4的要求。
          - title: 测量传声器
            paragraphs:
              - 应符合GY/T 311—2017中5.2.5的要求。
          - title: 声级计
            paragraphs:
              - 应符合GY/T 311—2017中5.2.6的要求。
          - title: 滤波器
            paragraphs:
              - 应符合GY/T 311—2017中5.2.7的要求。
          - title: 混响时间测量仪
            paragraphs:
              - 应符合GY/T 311—2017中5.2.8的要求。
          - title: 声校准器
            paragraphs:
              - 应符合GY/T 311—2017中5.2.9的要求。
          - title: 频谱分析仪
            paragraphs:
              - 应符合GY/T 311—2017中5.2.10的要求。
          - title: 长度尺
            paragraphs:
              - 应符合GY/T 311—2017中5.2.1的要求。
          - title: 激光测距仪
            paragraphs:
              - 应符合GY/T 311—2017中5.2.2的要求。
      - title: 测量信号
        children:
          - title: 单像素测量信号
            paragraphs:
              - 整幅图像分辨率为4,096×2,160或2,048×1,080，图像为黑底（信号编码值X’=0，Y’=0，Z’=0），从图像的左上角为起点，横向和纵向排列16×16像素彩条块的测量信号，见图2。
