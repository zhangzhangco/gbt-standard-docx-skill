sections:
  scope:
    - 本文件规定了4K数字电影LED影厅的技术要求及相应的测量方法。
    - 本文件适用于4K数字电影LED影厅的运行维护、检测认证、质量监督、技术管理和相关设备的安装、调试、验收和维护。
    - 本文件也适用于2K数字电影LED影厅。
  normative_references:
    intro: 下列文件中的内容通过文中的规范性引用而构成本文件必不可少的条款。其中，注日期的引用文件，仅该日期对应的版本适用于本文件；不注日期的引用文件，其最新版本（包括所有的修改单）适用于本文件。
    items:
      - GY/T 311—2017 电影院视听环境技术要求和测量方法
      - GY/T 312—2017 电影 录音控制室、室内影厅B环电声响应规范和测量
  terms_definitions:
    intro: 下列术语和定义适用于本文件。
    items:
      - term: 数字电影LED影厅 digital cinema LED auditorium
        definition:
          - 采用数字电影技术，使用LED显示屏放映电影的影厅。
        level: 1
      - term: 数字电影LED放映系统 digital cinema LED projection system
        definition:
          - 用来实现数字电影节目编码播放与数字放映的系统，主要由数字电影播放服务器、LED控制器、LED显示屏和还音系统组成。
        level: 1
      - term: 电光转换特性 electro-optic transfer characteristic
        definition:
          - LED显示屏的输入编码值与显示亮度之间的关系，用特性值表示。
        level: 1
      - term: 立体放映消光比 stereoscopic extinction ratio
        definition:
          - 左眼（右眼）图像亮度与串扰光和环境光的比，用于衡量左眼（右眼）图像亮度对串扰光和环境光的抗扰能力。
        level: 1

clauses:
  - title: 缩略语
    paragraphs:
      - 下列缩略语适用于本文件。
      - HDR 高动态范围（High Dynamic Range）
      - LED 发光二极管（Light-Emitting Diode）
      - SDR 标准动态范围（Standard Dynamic Range）
  - title: 数字电影LED放映系统组成
    paragraphs:
      - 数字电影LED放映系统主要由数字电影播放服务器、LED控制器、LED显示屏和还音系统组成，见图1。
      - type: figure
        bookmark: fig_system_arch
        title: 数字电影LED放映系统组成
        title_en: Digital cinema LED projection system composition
        paragraphs:
          - 图1表示数字电影播放服务器、LED控制器、LED显示屏和还音系统之间的组成关系。
  - title: 技术要求
    paragraphs:
      - 数字电影LED影厅技术要求应符合表1的规定。
      - type: table
        bookmark: table_req_1
        title: 数字电影LED影厅技术要求
        title_en: Technical requirements for digital cinema LED auditoriums
