topic: citations_and_prompts
source_clauses:
  - GB/T 1.1-2020 9.5.3
  - GB/T 1.1-2020 9.5.4
  - GB/T 1.1-2020 9.5.5
summary: 提及文件具体内容时应提及编号而非页码；规范性引用、资料性引用和提示应在正文中用不同表达方式区分。
check_points:
  - 不应通过页码提示文件内容，应提示章、条、附录、图、表、公式编号。
  - 注日期引用应带年份，不注日期引用不应带年份。
  - 规范性提示宜用“应符合……”“按照……规定的……”。
  - 资料性提示宜用“见……”，不宜用“详见”“参见”。
  - 资料性引用文件应列入参考文献，规范性引用文件应列入第 2 章。
fix_policy:
  decision_type: ask_user
  auto_fix_candidates:
    - 将明显的“见上文/见下文”替换为具体编号提示
  ask_user_cases:
    - 正文提及的文件应列入规范性引用文件还是参考文献
report_reason_template: 文件引用、提示或引用归类方式与 GB/T 1.1-2020 第 9.5 条不一致，建议统一到编号化、可追溯的表述。
