topic: lists
source_clauses:
  - GB/T 1.1-2020 7.5
summary: 列项由引导语和并列各项构成，应根据引导语结尾和列项层级选择合适的符号、编号和标点。
check_points:
  - 列项前应存在引导语。
  - 引导语为完整句并以句号结尾时，后续各项通常也以句号结束。
  - 引导语以冒号结尾时，后续各项通常以分号或逗号结束，最后一项以句号结束。
  - 第一层次通常使用破折号或字母编号，进一步细分时可使用间隔号或数字编号。
  - 列项细分通常不宜超过两个层次。
fix_policy:
  decision_type: ask_user
  auto_fix_candidates:
    - 统一同组列项末尾标点
  ask_user_cases:
    - 选择破折号、字母编号、数字编号还是并段表述
    - 确认引导语应以冒号还是句号收束
report_reason_template: 列项的引导语、层级形式或结尾标点与 GB/T 1.1-2020 第 7.5 条不一致，建议统一列项组织方式。
