topic: normative_references
source_clauses:
  - GB/T 1.1-2020 8.6
  - GB/T 1.1-2020 9.5.4
summary: 规范性引用文件为第 2 章，由固定引导语和文件清单构成；文件清单不编号，需按文件类别和标准号排序。
check_points:
  - 该要素应设置为第 2 章，且不分条。
  - 应使用固定引导语；无条目时应使用“本文件没有规范性引用文件。”。
  - 文件清单中的条目前不加序号。
  - 引用国际文件时宜给出中文译名，并在圆括号中保留原文名称。
  - 规范性引用与资料性引用应在正文中明确区分。
  - 所有规范性引用文件都应在本章列出。
fix_policy:
  decision_type: ask_user
  auto_fix_candidates:
    - 规范引导语
    - 统一条目书写格式
  ask_user_cases:
    - 某条提及应归入规范性引用文件还是参考文献
report_reason_template: 规范性引用文件的结构、引导语或条目书写方式与 GB/T 1.1-2020 第 8.6 条和第 9.5.4 条不一致。
