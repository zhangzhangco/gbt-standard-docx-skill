topic: scope
source_clauses:
  - GB/T 1.1-2020 8.5
summary: 范围应作为第 1 章，使用陈述型条款界定标准化对象、覆盖方面和适用界限，不应包含要求、指示、推荐或允许型条款。
check_points:
  - 范围应设置为第 1 章。
  - 范围应简洁，可用作内容提要。
  - 范围中不应出现背景信息。
  - 范围中不应包含要求、指示、推荐和允许型条款。
  - 常见表述形式包括“本文件规定了……”“本文件适用于……”“本文件不适用于……”。
fix_policy:
  decision_type: ask_user
  auto_fix_candidates:
    - 规范“本文件规定了/适用于/不适用于”句式
report_reason_template: 范围的内容或表述方式与 GB/T 1.1-2020 第 8.5 条关于范围用途和句式的要求不一致。
