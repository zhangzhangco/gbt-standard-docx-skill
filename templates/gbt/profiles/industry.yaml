profile_id: industry
match:
  core_title: 行业标准
render_caption_english: false
render_annex_marker_english: false

field_map:
  ICS: cover.ics
  CSDN: cover.ccs
  c1: cover.record_number
  c2: cover.standard_system_name
  文字1: computed.standard_prefix
  NSTD_CODE_F: computed.standard_number_front
  NSTD_CODE_B: computed.standard_number_back
  OSTD_CODE: computed.replaced_line
  CSTD_NAME: cover.title_zh
  ESTD_NAME: cover.title_en
  IN_STD_CODE: cover.alignment_degree
  CMPLSH_DATE: cover.completion_date
  PLSH_DATE_Y: computed.published_year
  PLSH_DATE_M: computed.published_month
  PLSH_DATE_D: computed.published_day
  CROT_DATE_Y: computed.implementation_year
  CROT_DATE_M: computed.implementation_month
  CROT_DATE_D: computed.implementation_day
  fm: cover.issuing_body

field_format:
  c1:
    font_size: 18
    font_ascii: 宋体
    font_eastAsia: 宋体
    font_hansi: Times New Roman
    bold: false
    paragraph_align: right
    first_line: 0

exact_text_map:
  XX/T XXXXX—XXXX: cover.standard_number
